<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecom Greenway</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f9f5;
      color: #1a2e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 2.5rem; font-weight: 700; color: #2e7d32; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.1rem; color: #555; margin-bottom: 2rem; }
    .cta {
      display: inline-block;
      background: #2e7d32;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .cta:hover { background: #1b5e20; }
  </style>
</head>
<body>
  <div class="logo">🌿 Ecom Greenway</div>
  <p class="tagline">Thương mại điện tử xanh — Bền vững từ gốc rễ</p>
  <a class="cta" href="#">Khám phá ngay</a>
</body>
</html>
